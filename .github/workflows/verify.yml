name: verify

# Machine-checks the r = 5 resolution of Erdős Problem 617.
#
# Two jobs, by cost:
#   * fidelity — fast (~Mathlib-cache + one file). Builds the statement/chain file
#     and runs the source-level `sorry` gate. This is the check most auditors
#     care about (does the Lean STATEMENT match the problem, and is the chain
#     sorry-free) and it needs no SAT certificates.
#   * machine-check — the complete kernel verification: regenerate the four SAT
#     certificates, `lake build` the whole project (this kernel-checks the
#     certificates via native_decide), then audit the axioms of the four final
#     theorems. Cost profile (measured): the native_decide recheck of all four
#     certificates is ~2 min / ~1.1 GB RAM (fine on a hosted runner), but the
#     CaDiCaL *regeneration* of nonex11/nonex12 is the slow step — many minutes,
#     producing ~340MB/~455MB LRAT proofs — hence the long timeout. If that step
#     is too slow on the default runner, either switch it to download the
#     certificates from a release asset (see README "Certificates") or use a
#     larger/self-hosted runner. The fast `fidelity` job is the primary signal
#     and does not depend on this one.
#
# The LRAT certificates themselves are NOT in the repository (they are
# git-ignored, ~815MB total); this workflow regenerates them from the shipped
# Lean CNF definitions with CaDiCaL. See README.md and FORMAL.md F3.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fidelity:
    name: statement fidelity + sorry gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache Mathlib build (reservoir olean cache)
        uses: actions/cache@v4
        with:
          path: lean617/.lake
          key: lake-${{ hashFiles('lean617/lean-toolchain', 'lean617/lake-manifest.json') }}

      - name: Fetch Mathlib olean cache
        working-directory: lean617
        run: lake exe cache get

      - name: Build the statement + chain (Statements.lean — no certificates needed)
        working-directory: lean617
        run: lake build Lean617.Statements

      - name: Source-level sorry gate
        run: ./tools/sorry_grep.sh

      # Fidelity of the self-contained comparator Challenge: its vendored
      # definitions and theorem signatures must stay byte-identical to the
      # canonical sources. Needs no Lean/build, so it lives in this fast job as a
      # hard gate (comparator re-checks the same thing at the kernel level).
      - name: Comparator Challenge fidelity (vendored defs match canonical)
        run: ./tools/comparator/check_challenge_fidelity.sh

      - name: Validate comparator config against its Config schema
        run: python3 tools/comparator/validate_config.py tools/comparator/erdos617_r5.json

  machine-check:
    name: full kernel verification + axiom audit
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install CaDiCaL (SAT solver, for certificate regeneration)
        run: sudo apt-get update && sudo apt-get install -y cadical

      - name: Cache Mathlib build (reservoir olean cache)
        uses: actions/cache@v4
        with:
          path: lean617/.lake
          key: lake-${{ hashFiles('lean617/lean-toolchain', 'lean617/lake-manifest.json') }}

      - name: Fetch Mathlib olean cache
        working-directory: lean617
        run: lake exe cache get

      # Build the CNF-emit / LRAT-trim helpers and the encoding, so regeneration
      # (which invokes `lake env lean --run`) has its imports available.
      - name: Pre-build encoding (for certificate regeneration)
        working-directory: lean617
        run: lake build Lean617.PrimEncoding

      - name: Regenerate the four SAT certificates
        run: ./tools/regen_certificates.sh

      - name: Build everything (kernel-checks the certificates via native_decide)
        working-directory: lean617
        # Memory note (kernel-pure migration, 2026-07-14): KPConstruction and
        # JoinTransport are proved by kernel `decide` and peak ~6 GB RAM each.
        # They sit on one dependency chain, so lake never builds them
        # concurrently; peak build memory is ~6 GB + light modules, fine on a
        # 16 GB hosted runner. (This Lake version has no jobs flag; on smaller
        # machines, build the heavy module first: `lake build Lean617.KPConstruction`.)
        run: lake build

      - name: Axiom audit of the four final theorems
        run: ./tools/axiom_audit.sh

      - name: Source-level sorry gate
        run: ./tools/sorry_grep.sh

  comparator:
    name: comparator (standard-tool statement-match + axiom-conformance)
    runs-on: ubuntu-latest
    # NON-BLOCKING for now. This job cross-checks the four final theorems with the
    # standard leanprover/comparator tool. Two open risks keep it advisory (README
    # "Open risks"): (1) FEASIBILITY — the four permitted axioms embed 340/455MB LRAT
    # certificates in their types, so comparator must export + kernel-replay a
    # multi-GB blob; run_comparator.sh runs a standalone Solution-export probe first
    # and logs bytes/time/RSS so a memory/time wall is reported precisely. (2)
    # TOOLCHAIN — comparator (v4.33) parsing our v4.30.0 export (lean4export is
    # pinned to its v4.30.0 tag, so the exporter reads our oleans natively). Drop
    # continue-on-error to make this a required gate once green. The fast `fidelity`
    # job already hard-gates Challenge fidelity + config schema, so those signals are
    # not lost while this is advisory. See tools/comparator/README.md.
    continue-on-error: true
    timeout-minutes: 240
    env:
      # comparator has no v4.30 line; pin its master HEAD (resolved 2026-07-19) for
      # reproducibility. lean4export HAS a v4.30.0 tag matching our Solution's
      # toolchain, so pin that — it reads our oleans natively.
      COMPARATOR_REV: c3903e1ed0148a32cd39510707c632dc4d265514
      LEAN4EXPORT_REV: v4.30.0
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Install CaDiCaL (SAT solver, for certificate regeneration)
        run: sudo apt-get update && sudo apt-get install -y cadical

      - name: Set up Go (to build landrun)
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Cache Mathlib build (reservoir olean cache)
        uses: actions/cache@v4
        with:
          path: lean617/.lake
          key: lake-${{ hashFiles('lean617/lean-toolchain', 'lean617/lake-manifest.json') }}

      - name: Fetch Mathlib olean cache
        working-directory: lean617
        run: lake exe cache get

      - name: Pre-build encoding (for certificate regeneration)
        working-directory: lean617
        run: lake build Lean617.PrimEncoding

      - name: Regenerate the four SAT certificates
        run: ./tools/regen_certificates.sh

      - name: Build the Solution (Lean617.Final; kernel-checks certs via native_decide)
        working-directory: lean617
        run: lake build Lean617.Final

      - name: Build landrun (Linux Landlock sandbox)
        run: |
          git clone --depth 1 https://github.com/Zouuup/landrun /tmp/landrun
          cd /tmp/landrun
          go build -o "$RUNNER_TEMP/landrun" cmd/landrun/main.go
          echo "COMPARATOR_LANDRUN=$RUNNER_TEMP/landrun" >> "$GITHUB_ENV"

      - name: Build lean4export against our v4.30.0 toolchain (to read our oleans)
        run: |
          git clone https://github.com/leanprover/lean4export /tmp/lean4export
          cd /tmp/lean4export
          git checkout "$LEAN4EXPORT_REV"
          # olean format is version-specific: force the toolchain to the Solution's.
          cp "$GITHUB_WORKSPACE/lean617/lean-toolchain" lean-toolchain
          lake build
          echo "COMPARATOR_LEAN4EXPORT=$(realpath .lake/build/bin/lean4export)" >> "$GITHUB_ENV"

      - name: Build comparator
        run: |
          git clone https://github.com/leanprover/comparator /tmp/comparator
          cd /tmp/comparator
          git checkout "$COMPARATOR_REV"
          lake build comparator
          echo "COMPARATOR_COMPARATOR=$(realpath .lake/build/bin/comparator)" >> "$GITHUB_ENV"

      - name: Validate config + Challenge fidelity
        run: |
          python3 tools/comparator/validate_config.py tools/comparator/erdos617_r5.json
          ./tools/comparator/check_challenge_fidelity.sh

      - name: Run comparator on the four final theorems
        env:
          SKIP_CERT_REGEN: "1"   # certificates already regenerated above
        run: ./tools/comparator/run_comparator.sh
